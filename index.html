    <!-- Noise SVG filter for premium texture -->
    <style>
      #noise-filter { position: fixed; width: 0; height: 0; overflow: hidden; }

  <body>
    <!-- SVG noise filter -->
    <svg id="noise-filter" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
          <feColorMatrix type="saturate" values="0" in="noiseOut" result="desaturated"/>
          <feBlend in="SourceGraphic" in2="desaturated" mode="overlay"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
